services:
  app:
    build:
      context: ./GoldenCrow
      dockerfile: Dockerfile
    ports:
      - "5087:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=mssql;Database=GoldenCrown;User Id=sa;Password=MsSql_Pass123!;TrustServerCertificate=True
      - RabbitMQ__Hostname=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    depends_on:
      mssql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=MsSql_Pass123!
    ports:
      - "1433:1433"
    volumes:
      - mssql_goldencrown_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "MsSql_Pass123!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  rabbitmq:
    image: rabbitmq:3.12.3-management
    hostname: rabbitmq
    restart: unless-stopped
    ports:
      - "15672:15672"
      - "5672:5672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  tax-inspection-console:
    build:
      context: ./
      dockerfile: GoldenCrown.TaxInspectionConsole2/Dockerfile
    environment:
      - RabbitMQ__Hostname=rabbitmq
      - RabbitMQ__Username=guest
      - RabbitMQ__Password=guest
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  mssql_goldencrown_data:
  rabbitmq_data: